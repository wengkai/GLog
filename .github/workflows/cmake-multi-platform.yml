# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: lxxl1024/almalinux-qt693-builder:latest

    defaults:
      run:
        shell: bash -l {0}
    
    steps:
      - uses: actions/checkout@v4

      - name: Build & Test
        run: |
          . $ENABLE_GCC_TOOLSET && qt-cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          . $ENABLE_GCC_TOOLSET && cmake --build build
#          ctest --test-dir build --output-on-failure

      - name: Package AppImage
        run: |
          DESTDIR=$PWD/AppDir cmake --install build 
          linuxdeploy --appdir $PWD/AppDir \
            -d $PWD/linux-deploy/GLog.desktop \
            -e $PWD/AppDir/usr/bin/GLog \
            -i $PWD/linux-deploy/GLog.png \
            --plugin=qt --output appimage

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-Linux
          path: ./*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: choco install winflexbison3 -y

      - name: Download Custom Qt
        shell: pwsh
        run: |
          curl -L -o qt6_custom.zip "https://github.com/llxx2013/qt6windows7/releases/download/6.8.3-msvc-release/6.8.3-msvc-release.zip"
          Expand-Archive qt6_custom.zip -DestinationPath C:\QtCustom

      - name: Setup Environment
        shell: pwsh
        run: |
          echo "C:\QtCustom\bin" >> $GITHUB_PATH
          ls "C:\ProgramData\chocolatey\lib\winflexbison3\tools\"

      - name: Configure CMake
        shell: cmd
        run: |
          call C:\QtCustom\bin\qt-cmake.bat -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DFLEX_INCLUDE_DIRS="C:\ProgramData\chocolatey\lib\winflexbison3\tools"

      - name: Build & Test
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          cd build
#          ctest -C Release --output-on-failure

      - name: Install & Deploy
        shell: pwsh
        run: |
          cmake --install build --prefix C:/AppDir
          Compress-Archive -Path C:/AppDir/* -DestinationPath GLog-windows-x64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zip-Windows
          path: GLog-windows-x64.zip

  release:
    name: Create Release
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
          merge-multiple: true

      - name: Determine Release Type
        id: check_tag
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" =~ (rc|alpha|beta|dev) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.AppImage
            ./artifacts/*.zip
          prerelease: ${{ steps.check_tag.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}