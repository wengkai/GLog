# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: lxxl1024/almalinux-qt693-builder:latest

    defaults:
      run:
        shell: bash -l {0}
    
    steps:
      - uses: actions/checkout@v4

      - name: Build & Test
        run: |
          . $ENABLE_GCC_TOOLSET && qt-cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          . $ENABLE_GCC_TOOLSET && cmake --build build
          QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure --verbose

      - name: Package AppImage
        run: |
          DESTDIR=$PWD/AppDir cmake --install build 
          VERSION=${{ github.ref_name }} linuxdeploy --appdir $PWD/AppDir \
            -d $PWD/linux-deploy/GLog.desktop \
            -e $PWD/AppDir/usr/bin/GLog \
            -i $PWD/linux-deploy/GLog.png \
            --plugin=qt --output appimage
#          mv *.AppImage GLog-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-Linux
          path: ./*.AppImage

  build-windows:
    runs-on: windows-latest
    env:
      DOWNLOAD_URL: "https://github.com/llxx2013/qt6windows7/releases/download/6.8.3-msvc-release/6.8.3-msvc-release.zip"
      TARGET_PATH: "downloads/qt6_custom.zip"
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: choco install winflexbison3 -y

      - name: Cache Downloaded File
        uses: actions/cache@v4
        id: cache-download
        with:
          path: ${{ env.TARGET_PATH }}
          key: download-${{ env.DOWNLOAD_URL }}

      - if: steps.cache-download.outputs.cache-hit != 'true'
        name: Download Custom Qt
        shell: pwsh
        run: |
          curl -L -o ${{ env.TARGET_PATH }} ${{ env.DOWNLOAD_URL }}

      - name: Setup Environment
        shell: pwsh
        run: |
          Expand-Archive ${{ env.TARGET_PATH }} -DestinationPath C:\QtCustom
          echo "C:\QtCustom\bin" >> $GITHUB_PATH
          ls "C:\ProgramData\chocolatey\lib\winflexbison3\tools\"

      - name: Configure CMake
        shell: cmd
        run: |
          call C:\QtCustom\bin\qt-cmake.bat -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DFLEX_INCLUDE_DIRS="C:\ProgramData\chocolatey\lib\winflexbison3\tools"

      - name: Build & Test
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          cd build
          ctest -C Release --output-on-failure --verbose

      - name: Install & Deploy
        shell: pwsh
        run: |
          cmake --install build --prefix C:/AppDir
          $fileName = "GLog-${{ github.ref_name }}-windows-x64.zip"
          Compress-Archive -Path C:/AppDir/* -DestinationPath $fileName

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zip-Windows
          path: GLog-*.zip
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'mac'
          target: 'desktop'
          modules: 'qtcharts qtsvg'

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$Qt6_DIR \
            -DCMAKE_INSTALL_PREFIX=./deploy_out

      - name: Build & Test
        run: |
          cmake --build build --config Release
          cd build
          ctest -C Release --output-on-failure

      - name: Install & Deploy
        run: |
          cmake --install build --config Release --prefix deploy_out
          APP_PATH=$(find deploy_out -name "*.app" -type d -maxdepth 3 | head -n 1)
          echo "Found App Bundle: $APP_PATH"
          
          DMG_NAME="GLog-macOS-${{ github.ref_name }}.dmg"
          hdiutil create -volname "GLog" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: *.dmg

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.AppImage
            ./artifacts/*.zip
            ./artifacts/*.dmg
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'dev') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}